name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck bin/cc bin/cc-use entrypoint.sh install.sh uninstall.sh
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Validate compose
        run: docker compose config -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GitHub runner 在境外，关闭国内加速源以避免反向慢
      - name: Build image
        run: |
          docker compose build \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg GH_PROXY= \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org
      - name: Image size
        run: docker images docker-cc:latest --format '{{.Size}}'

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get install -y bats jq
      - name: Run unit tests
        run: bats tests/unit/

  integration:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get install -y bats jq
      - name: Build image (depends_on build job not enough; rebuild here)
        run: |
          docker compose build \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg GH_PROXY= \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org
      - name: Run integration tests
        run: bats tests/integration/
