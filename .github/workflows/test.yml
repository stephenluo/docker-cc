name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上的新 push 自动取消正在跑的旧 run，避免老 run 占资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck bin/dcc bin/dcc-use entrypoint.sh install.sh uninstall.sh
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Validate compose
        run: docker compose config -q

  # —— 仅在 PR 跑：build 和 integration 重资源（含 npm install claude-code），
  #    main push 不重跑（release.yml 已经在 tag 时做 multi-arch build + push）。——
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GitHub runner 在境外，关闭国内加速源以避免反向慢
      - name: Build image
        run: |
          docker compose build \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg GH_PROXY= \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org
      - name: Image size
        run: docker images docker-cc:latest --format '{{.Size}}'

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get install -y bats jq
      - name: Run unit tests
        run: bats tests/unit/

  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get install -y bats jq
      - name: Build image (depends_on build job not enough; rebuild here)
        run: |
          docker compose build \
            --build-arg APT_MIRROR=deb.debian.org \
            --build-arg GH_PROXY= \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org
      - name: Run integration tests
        run: bats tests/integration/
